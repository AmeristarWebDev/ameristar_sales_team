<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Team</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
    line-height: 1.4;
  }

  .team-section {
    margin-bottom: 0px;
  }

  .team-section h2 {
    font-size: 35px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 24px;
    padding-bottom: 10px;
    border-bottom: 2px solid #0033a0;
  }

  .team-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 28px 24px;
  }

  .headshot-card {
    text-align: center;
  }

  .headshot-img-wrapper {
    width: 100%;
    aspect-ratio: 3 / 5;
    overflow: hidden;
    background: #e8e8e8;
    margin-bottom: 12px;
  }

  .headshot-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .headshot-name {
    font-size: 20px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 2px;
  }

  .headshot-region {
    font-size: 13px;
    color: #666;
    font-weight: 400;
  }

  /* Responsive fallbacks */
  @media (max-width: 1100px) {
    .team-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 880px) {
    .team-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 600px) {
    .team-grid { grid-template-columns: repeat(2, 1fr); }
    body { padding: 16px; }
    .team-section h2 { font-size: 19px; }
  }
</style>
</head>
<body>

  <!-- =========================================================
       INSIDE SALES TEAM - EAST
       ========================================================= -->
  <section class="team-section">
    <h2>Inside Sales Team - East</h2>
    <div class="team-grid">
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/ashli-darling.jpg" alt="Ashli Darling"></div>
        <div class="headshot-name">Ashli Darling</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/angela-price.jpg" alt="Angela Price"></div>
        <div class="headshot-name">Angela Price</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/toni-butler.jpg" alt="Toni Butler"></div>
        <div class="headshot-name">Toni Butler</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/jessica-sadler.jpg" alt="Jessica Sadler"></div>
        <div class="headshot-name">Jessica Sadler</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/mary-stout.jpg" alt="Mary Stout"></div>
        <div class="headshot-name">Mary Stout</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/dustin-mullinax.jpg" alt="Dustin Mullinax"></div>
        <div class="headshot-name">Dustin Mullinax</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/chandra-robinson.jpg" alt="Chandra Robinson"></div>
        <div class="headshot-name">Chandra Robinson</div>
      </div>
      <div class="headshot-card">
        <div class="headshot-img-wrapper"><img class="headshot-img" src="images/chris-guthrie.jpg" alt="Chris Guthrie"></div>
        <div class="headshot-name">Chris Guthrie</div>
      </div>
    </div>
  </section>
</body>
</html>
